version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ANOMALY_THRESHOLD=0.05
      - LOG_LEVEL=INFO
    volumes:
      - ./model/weights:/app/model/weights:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
